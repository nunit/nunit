name: Continuous Integration

on:
  push:
    branches:
      - main
      - release
      - 'v3'
  pull_request:
  
env:
  DOTNET_NOLOGO: true                     # Disable the .NET logo
  DOTNET_CLI_TELEMETRY_OPTOUT: true       # Disable sending .NET CLI telemetry  

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
        dotnet-version: |
            6.0.x
            10.0.x
        
    - name: 🛠️ Install dotnet tools
      run: dotnet tool restore

    - name: 🔨 Build and Test
      run: dotnet tool run dotnet-cake --target=Test --configuration=Release  --quiet=false --minimal=true

    - name: 📦 Package
      run: dotnet tool run dotnet-cake --target=Package

    - name: 💾 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Package
        path: package

    - name: 💾 Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: Test results (Windows)
        path: TestResults
      if: ${{ always() }}

    - name: 🧪 Test Report
      if: ${{ always() }}
      uses: ./.github/actions/test-reporter
      with:
        name: "Tests (${{ runner.os }})"
        path: TestResults/**/*.trx
        fail-on-error: false
        token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
        dotnet-version: |
            6.0.x
            10.0.x

    - name: 🛠️ Install F#
      run: sudo apt-get install fsharp

    - name: 🛠️ Install dotnet tools
      run: dotnet tool restore

    - name: 🔨 Build and Test
      run: dotnet tool run dotnet-cake --target=Test --configuration=Release --quiet=false --minimal=true

    - name: 💾 Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: Test results (Linux)
        path: TestResults
      if: ${{ always() }}

    - name: 🧪 Test Report
      if: ${{ always() }}
      uses: ./.github/actions/test-reporter
      with:
        name: "Tests (${{ runner.os }})"
        path: TestResults/**/*.trx
        fail-on-error: false
        token: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: MacOS Build
    runs-on: macos-14

    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
        dotnet-version: |
            6.0.x
            10.0.x

    - name: 🛠️ Install dotnet tools
      run: dotnet tool restore --tool-manifest ./.config-macos/dotnet-tools.json

    - name: 🔨 Build and Test
      run: dotnet tool run dotnet-cake --target=Test --configuration=Release --quiet=false --minimal=true

    - name: 💾 Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: Test results (macOS)
        path: TestResults
      if: ${{ always() }}

    - name: 🧪 Test Report
      if: ${{ always() }}
      uses: ./.github/actions/test-reporter
      with:
        name: "Tests (${{ runner.os }})"
        path: TestResults/**/*.trx
        fail-on-error: false
        token: ${{ secrets.GITHUB_TOKEN }}
